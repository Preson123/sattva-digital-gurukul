<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sattva Portal | Secure Entrance</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #1F382B;
            --accent: #F0A500;
            --saffron: #FF7F00;
        }

        html, body {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: var(--primary);
        }

        h1, h2, h3, .brand { font-family: 'Cinzel', serif; }

        .portal-wrapper {
            position: relative; height: 100%; width: 100%;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(31, 56, 43, 0.9), rgba(31, 56, 43, 0.85)),
                        url("https://images.unsplash.com/photo-1545205597-3d9d02c29597?auto=format&fit=crop&w=1920&q=80");
            background-size: cover; background-position: center;
        }

        .glass-portal {
            width: 95%; max-width: 460px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 3rem;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
            z-index: 10;
        }

        .auth-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: 0.3s ease;
        }

        .auth-input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            box-shadow: 0 0 15px rgba(240, 165, 0, 0.2);
        }

        .btn-saffron {
            background: linear-gradient(135deg, #ff7f00, #f06200);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-saffron:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255, 127, 0, 0.4); }

        .tab-btn {
            font-size: 10px; font-weight: 800; letter-spacing: 0.2em;
            color: rgba(255,255,255,0.4);
            padding-bottom: 8px; border-bottom: 2px solid transparent;
            transition: 0.3s;
        }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .hidden-phase { display: none; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 px-8 py-5 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-10 h-10 bg-[var(--primary)] text-white rounded-xl flex items-center justify-center font-bold shadow-lg border border-white/10">S</div>
            <div>
                <span class="brand text-xl font-bold block leading-none tracking-tighter text-white">SATTVA</span>
                <span class="text-[9px] tracking-[0.3em] text-[var(--accent)] font-bold uppercase">Digital Gurukula</span>
            </div>
        </div>
        <div class="flex gap-4">
             <button onclick="switchRole('sadhaka')" id="roleSadhaka" class="text-[9px] font-bold uppercase tracking-widest text-white border border-white/20 px-4 py-2 rounded-full bg-white/10">Sadhaka</button>
             <button onclick="switchRole('guru')" id="roleGuru" class="text-[9px] font-bold uppercase tracking-widest text-white/40 border border-white/5 px-4 py-2 rounded-full">Guru Access</button>
        </div>
    </nav>

    <div class="portal-wrapper">
        <div class="glass-portal">
            
            <div id="authTabs" class="flex gap-8 mb-10 justify-center">
                <button onclick="showPhase('login')" class="tab-btn active" id="tabLogin">LOGIN</button>
                <button onclick="showPhase('enroll')" class="tab-btn" id="tabEnroll">ENROLL</button>
            </div>

            <div id="phaseLogin" class="auth-phase">
                <div class="text-center mb-8">
                    <h2 id="loginTitle" class="text-3xl font-bold text-white">Namaste</h2>
                    <p id="loginSub" class="text-white/40 text-sm font-light">Enter the sacred space.</p>
                </div>
                <div class="space-y-4">
                    <input type="email" id="logEmail" placeholder="Email ID" class="auth-input w-full px-6 py-4 rounded-2xl">
                    <input type="password" id="logPass" placeholder="Mantra (Password)" class="auth-input w-full px-6 py-4 rounded-2xl">
                    <div class="flex justify-between items-center px-2">
                        <label class="text-white/30 text-[9px] uppercase font-bold flex items-center gap-2">
                            <input type="checkbox" class="accent-[var(--accent)]"> Stay Signed In
                        </label>
                        <button onclick="showPhase('forgot')" class="text-[var(--accent)] text-[9px] font-bold uppercase hover:underline">Forgot Mantra?</button>
                    </div>
                    <button onclick="handleAuth('login')" class="btn-saffron w-full py-5 rounded-2xl text-white font-bold tracking-widest text-xs uppercase mt-4">
                        REVEAL PORTAL <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>

            <div id="phaseEnroll" class="auth-phase hidden-phase">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-white">New Sadhaka</h2>
                    <p class="text-white/40 text-sm font-light">Begin your 40-day transformation.</p>
                </div>
                <div class="space-y-4">
                    <input type="text" id="regName" placeholder="Full Name" class="auth-input w-full px-6 py-4 rounded-2xl">
                    <input type="email" id="regEmail" placeholder="Valid Email" class="auth-input w-full px-6 py-4 rounded-2xl">
                    <input type="password" id="regPass" placeholder="Create Mantra" class="auth-input w-full px-6 py-4 rounded-2xl">
                    <button onclick="handleAuth('enroll')" class="btn-saffron w-full py-5 rounded-2xl text-white font-bold tracking-widest text-xs uppercase mt-4">
                        INITIALIZE JOURNEY <i class="fas fa-seedling ml-2"></i>
                    </button>
                </div>
            </div>

            <div id="phaseForgot" class="auth-phase hidden-phase">
                <div class="text-center mb-8">
                    <i class="fas fa-key text-[var(--accent)] text-4xl mb-4"></i>
                    <h2 class="text-2xl font-bold text-white">Recover Mantra</h2>
                    <p class="text-white/40 text-sm font-light">Enter your email for the verification seed.</p>
                </div>
                <div class="space-y-4">
                    <input type="email" id="resetEmail" placeholder="Registered Email" class="auth-input w-full px-6 py-4 rounded-2xl">
                    <button onclick="initReset()" class="btn-saffron w-full py-5 rounded-2xl text-white font-bold tracking-widest text-xs uppercase mt-4">
                        SEND VERIFICATION <i class="fas fa-paper-plane ml-2"></i>
                    </button>
                    <button onclick="showPhase('login')" class="w-full text-white/30 text-[9px] font-bold uppercase tracking-widest hover:text-white transition">Back to Login</button>
                </div>
            </div>

            <div id="phaseVerify" class="auth-phase hidden-phase">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold text-white">Check Email</h2>
                    <p id="verifyDisplay" class="text-white/40 text-sm font-light">Code sent to: </p>
                </div>
                <div class="space-y-6">
                    <div class="flex justify-center gap-3">
                        <input maxlength="1" class="auth-input w-12 h-16 rounded-xl text-center text-2xl font-bold">
                        <input maxlength="1" class="auth-input w-12 h-16 rounded-xl text-center text-2xl font-bold">
                        <input maxlength="1" class="auth-input w-12 h-16 rounded-xl text-center text-2xl font-bold">
                        <input maxlength="1" class="auth-input w-12 h-16 rounded-xl text-center text-2xl font-bold">
                    </div>
                    <button onclick="window.location.href='journey.html'" class="btn-saffron w-full py-5 rounded-2xl text-white font-bold tracking-widest text-xs uppercase">
                        VERIFY & ENTER
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentRole = 'sadhaka';

        // Role Switcher (Sadhaka vs Guru)
        function switchRole(role) {
            currentRole = role;
            const sBtn = document.getElementById('roleSadhaka');
            const gBtn = document.getElementById('roleGuru');
            const title = document.getElementById('loginTitle');
            const sub = document.getElementById('loginSub');

            if(role === 'guru') {
                gBtn.classList.add('bg-white/10', 'border-white/20', 'text-white');
                gBtn.classList.remove('text-white/40', 'border-white/5');
                sBtn.classList.remove('bg-white/10', 'border-white/20', 'text-white');
                sBtn.classList.add('text-white/40', 'border-white/5');
                title.innerText = "Guru Login";
                sub.innerText = "Authorized Lineage Access Only";
                document.getElementById('tabEnroll').style.display = 'none';
            } else {
                sBtn.classList.add('bg-white/10', 'border-white/20', 'text-white');
                sBtn.classList.remove('text-white/40', 'border-white/5');
                gBtn.classList.remove('bg-white/10', 'border-white/20', 'text-white');
                gBtn.classList.add('text-white/40', 'border-white/5');
                title.innerText = "Namaste";
                sub.innerText = "Enter the sacred space.";
                document.getElementById('tabEnroll').style.display = 'block';
            }
        }

        // Phase Swapping Logic
        function showPhase(phase) {
            document.querySelectorAll('.auth-phase').forEach(p => p.classList.add('hidden-phase'));
            document.getElementById('phase' + phase.charAt(0).toUpperCase() + phase.slice(1)).classList.remove('hidden-phase');
            
            // Handle Tabs
            if(phase === 'login' || phase === 'enroll') {
                document.getElementById('authTabs').classList.remove('hidden-phase');
                document.getElementById('tabLogin').classList.toggle('active', phase === 'login');
                document.getElementById('tabEnroll').classList.toggle('active', phase === 'enroll');
            } else {
                document.getElementById('authTabs').classList.add('hidden-phase');
            }
        }

        // Mantra Recovery Phase 1
        function initReset() {
            const email = document.getElementById('resetEmail').value;
            if(!email) return alert("Enter email for recovery.");
            document.getElementById('verifyDisplay').innerText = "Code sent to: " + email;
            showPhase('verify');
        }

        // Auth Submission
        function handleAuth(type) {
            let email = (type === 'login') ? document.getElementById('logEmail').value : document.getElementById('regEmail').value;
            let name = (type === 'enroll') ? document.getElementById('regName').value : email.split('@')[0];

            if(!email) return alert("Credentials required.");
            
            localStorage.setItem("sattva_user_name", name);
            localStorage.setItem("sattva_role", currentRole);
            window.location.href = "journey.html";
        }
    </script>
</body>
</html>
